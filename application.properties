spring.application.name=api_macronnect
server.port=8080

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/ventas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:ventas_user}
spring.datasource.password=${DB_PASSWORD:ventas123}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# --- JWT ---
app.jwt.secret=${JWT_SECRET:CLAVE123}
app.jwt.expiration-ms=3600000

# --- Usuario semilla ---
app.seed.admin-username=${ADMIN_USER:admin}
app.seed.admin-password=${ADMIN_PASSWORD:admin123}